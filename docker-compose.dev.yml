services:
  backend:
    build: ./backend
    container_name: billflow-backend-dev
    volumes:
      - ./backend:/app
    command: air
    ports:
      - "8090:8090"
    env_file: .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: billflow-frontend-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8090
